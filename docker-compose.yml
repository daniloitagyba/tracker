version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tracker-backend
    restart: unless-stopped
    expose:
      - "3007"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/dev.db
      - PORT=3007
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3006}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:3007}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY}
    volumes:
      - tracker-data:/app/prisma
    networks:
      - tracker-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=${FRONTEND_URL:-http://localhost:3006}
    container_name: tracker-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tracker-network

networks:
  tracker-network:
    driver: bridge

volumes:
  tracker-data:
    driver: local
